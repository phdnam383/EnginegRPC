# ══════════════════════════════════════════════════════════════════════════════
# ConfigMap — runtime configuration for the Alarm Cluster Engine
# ══════════════════════════════════════════════════════════════════════════════
apiVersion: v1
kind: ConfigMap
metadata:
  name: alarm-cluster-engine-config
  labels:
    app: alarm-cluster-engine
data:
  GRPC_PORT:    "50051"
  HEALTH_PORT:  "8080"
  MODEL_DIR:    "/app/models"
  MAX_WORKERS:  "10"
