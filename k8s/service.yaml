# ══════════════════════════════════════════════════════════════════════════════
# Service — exposes the gRPC server inside the cluster
# ══════════════════════════════════════════════════════════════════════════════
#
# Default: ClusterIP (internal only).
# Change `type: LoadBalancer` if the gRPC service needs to be reachable
# from outside the cluster (e.g. direct calls from MDAF Logic).
# ══════════════════════════════════════════════════════════════════════════════
apiVersion: v1
kind: Service
metadata:
  name: alarm-cluster-engine
  labels:
    app: alarm-cluster-engine
spec:
  type: ClusterIP
  selector:
    app: alarm-cluster-engine
  ports:
    - name: grpc
      port: 50051
      targetPort: grpc
      protocol: TCP
